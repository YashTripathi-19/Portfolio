<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ieeeBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00629B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003B73;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Diamond shape background -->
  <g transform="translate(100, 100) rotate(45)">
    <rect x="-60" y="-60" width="120" height="120" fill="url(#ieeeBlue)" stroke="#00629B" stroke-width="3" rx="5"/>
  </g>
  
  <!-- IEEE Diamond Symbol with Arrow/Compass -->
  <g transform="translate(100, 100)">
    <!-- Outer diamond border -->
    <path d="M0 -55 L55 0 L0 55 L-55 0 Z" 
          fill="none" 
          stroke="white" 
          stroke-width="4"/>
    
    <!-- Inner diamond -->
    <path d="M0 -45 L45 0 L0 45 L-45 0 Z" 
          fill="none" 
          stroke="white" 
          stroke-width="2"/>
    
    <!-- Arrow pointing up -->
    <g>
      <path d="M0 -30 L0 20" 
            stroke="white" 
            stroke-width="5" 
            stroke-linecap="round"/>
      <path d="M0 -30 L-12 -15 M0 -30 L12 -15" 
            stroke="white" 
            stroke-width="5" 
            stroke-linecap="round" 
            stroke-linejoin="round"/>
    </g>
    
    <!-- Circular base -->
    <ellipse cx="0" cy="0" rx="25" ry="8" 
             fill="none" 
             stroke="white" 
             stroke-width="3"/>
  </g>
  
  <!-- Corner accents -->
  <circle cx="20" cy="20" r="3" fill="#00629B" opacity="0.5"/>
  <circle cx="180" cy="20" r="3" fill="#00629B" opacity="0.5"/>
  <circle cx="20" cy="180" r="3" fill="#00629B" opacity="0.5"/>
  <circle cx="180" cy="180" r="3" fill="#00629B" opacity="0.5"/>
</svg>