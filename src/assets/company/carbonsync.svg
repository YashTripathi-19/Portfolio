<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EAA200;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Leaf outline -->
  <path d="M100 30 C120 40 150 70 150 110 C150 150 130 170 100 170 C70 170 50 150 50 110 C50 70 80 40 100 30 Z" 
