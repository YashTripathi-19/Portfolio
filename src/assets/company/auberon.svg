<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="auberonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4892B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F4A442;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Circle background -->
  <circle cx="100" cy="100" r="90" fill="#1a2332" stroke="url(#auberonGradient)" stroke-width="4"/>
  
  <!-- Stylized "A" letter with pharmaceutical cross -->
  <g transform="translate(100, 100)">
    <!-- Letter A -->
    <path d="M-40 40 L0 -50 L40 40 L30 40 L20 15 L-20 15 L-30 40 Z M-15 5 L15 5 L0 -30 Z" 
          fill="url(#auberonGradient)" 
          stroke="url(#auberonGradient)" 
          stroke-width="1"/>
    
    <!-- Medical cross accent -->
    <g transform="translate(0, -60)">
      <rect x="-3" y="-8" width="6" height="16" fill="#F4A442" rx="1"/>
      <rect x="-8" y="-3" width="16" height="6" fill="#F4A442" rx="1"/>
    </g>
  </g>
  
  <!-- Decorative corner elements -->
  <circle cx="30" cy="30" r="3" fill="#D4892B" opacity="0.6"/>
  <circle cx="170" cy="30" r="3" fill="#D4892B" opacity="0.6"/>
  <circle cx="30" cy="170" r="3" fill="#D4892B" opacity="0.6"/>
  <circle cx="170" cy="170" r="3" fill="#D4892B" opacity="0.6"/>
</svg>