<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueGear" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E88E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1565C0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGear" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D32F2F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B71C1C;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Large Blue Gear Background -->
  <circle cx="80" cy="100" r="70" fill="url(#blueGear)"/>
  
  <!-- Gear teeth (simplified) -->
  <g fill="url(#blueGear)">
    <rect x="75" y="25" width="10" height="15" rx="2"/>
    <rect x="125" y="75" width="15" height="10" rx="2"/>
    <rect x="75" y="160" width="10" height="15" rx="2"/>
    <rect x="10" y="95" width="15" height="10" rx="2"/>
  </g>
  
  <!-- Inner white circle -->
  <circle cx="80" cy="100" r="55" fill="white"/>
  
  <!-- Three people silhouettes (much larger) -->
  <g fill="url(#redGear)">
    <!-- Person 1 (left) -->
    <circle cx="55" cy="90" r="10"/>
    <ellipse cx="55" cy="115" rx="15" ry="20" />
    
    <!-- Person 2 (center) -->
    <circle cx="80" cy="85" r="10"/>
    <ellipse cx="80" cy="110" rx="15" ry="20" />
    
    <!-- Person 3 (right) -->
    <circle cx="105" cy="90" r="10"/>
    <ellipse cx="105" cy="115" rx="15" ry="20" />
  </g>
  
  <!-- Red Gear 1 (top right) -->
  <circle cx="145" cy="60" r="30" fill="url(#redGear)"/>
  <g fill="url(#redGear)">
    <rect x="142" y="25" width="6" height="10" rx="1"/>
    <rect x="170" y="57" width="10" height="6" rx="1"/>
    <rect x="142" y="85" width="6" height="10" rx="1"/>
    <rect x="110" y="57" width="10" height="6" rx="1"/>
  </g>
  <circle cx="145" cy="60" r="18" fill="white"/>
  
  <!-- Red Gear 2 (bottom right) with PSIT -->
  <circle cx="150" cy="130" r="35" fill="url(#redGear)"/>
  <g fill="url(#redGear)">
    <rect x="147" y="90" width="6" height="12" rx="1"/>
    <rect x="182" y="127" width="12" height="6" rx="1"/>
    <rect x="147" y="163" width="6" height="12" rx="1"/>
    <rect x="103" y="127" width="12" height="6" rx="1"/>
  </g>
  <circle cx="150" cy="130" r="22" fill="white"/>
  
  <!-- PSIT text (bold and centered) -->
  <text x="150" y="137" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1565C0">PSIT</text>
</svg>