<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Vibrant gradient - Purple to Cyan -->
    <linearGradient id="vibrantGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#915EFF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E61EFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00F0FF;stop-opacity:1" />
    </linearGradient>
    
    <!-- Subtle glow for depth -->
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Stylized Y with modern geometric design -->
  <g transform="translate(64, 64)" filter="url(#subtleGlow)">
    <!-- Left arm of Y -->
    <path d="M-35 -40 L-35 -30 L-8 10 L-8 40 L8 40 L8 10 L35 -30 L35 -40 L20 -40 L0 0 L-20 -40 Z" 
          fill="url(#vibrantGradient)" 
          stroke="url(#vibrantGradient)" 
          stroke-width="1"
          stroke-linejoin="round"/>
    
    <!-- Accent geometric elements -->
    <circle cx="-30" cy="-35" r="3.5" fill="#00F0FF"/>
    <circle cx="30" cy="-35" r="3.5" fill="#00F0FF"/>
    <circle cx="0" cy="35" r="3.5" fill="#E61EFF"/>
  </g>
  
  <!-- Modern corner accents -->
  <rect x="10" y="10" width="6" height="6" fill="url(#vibrantGradient)" opacity="0.6" rx="1"/>
  <rect x="112" y="10" width="6" height="6" fill="url(#vibrantGradient)" opacity="0.6" rx="1"/>
  <rect x="10" y="112" width="6" height="6" fill="url(#vibrantGradient)" opacity="0.6" rx="1"/>
  <rect x="112" y="112" width="6" height="6" fill="url(#vibrantGradient)" opacity="0.6" rx="1"/>
</svg>