<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Vibrant gradient - Purple to Cyan -->
    <linearGradient id="vibrantGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#915EFF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E61EFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00F0FF;stop-opacity:1" />
    </linearGradient>
    
    <!-- Subtle glow for depth -->
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Dark background with rounded corners -->
  <rect width="512" height="512" rx="100" fill="#0a0a0a"/>
  
  <!-- Stylized Y with modern geometric design -->
  <g transform="translate(256, 256)" filter="url(#subtleGlow)">
    <!-- Main Y shape -->
    <path d="M-140 -160 L-140 -120 L-32 40 L-32 160 L32 160 L32 40 L140 -120 L140 -160 L80 -160 L0 0 L-80 -160 Z" 
          fill="url(#vibrantGradient)" 
          stroke="url(#vibrantGradient)" 
          stroke-width="3"
          stroke-linejoin="round"/>
    
    <!-- Accent dots -->
    <circle cx="-120" cy="-140" r="14" fill="#00F0FF"/>
    <circle cx="120" cy="-140" r="14" fill="#00F0FF"/>
    <circle cx="0" cy="140" r="14" fill="#E61EFF"/>
  </g>
  
  <!-- Modern corner accents -->
  <rect x="40" y="40" width="24" height="24" fill="url(#vibrantGradient)" opacity="0.6" rx="6"/>
  <rect x="448" y="40" width="24" height="24" fill="url(#vibrantGradient)" opacity="0.6" rx="6"/>
  <rect x="40" y="448" width="24" height="24" fill="url(#vibrantGradient)" opacity="0.6" rx="6"/>
  <rect x="448" y="448" width="24" height="24" fill="url(#vibrantGradient)" opacity="0.6" rx="6"/>
</svg>